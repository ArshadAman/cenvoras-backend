# Production override - docker-compose.yml will be merged with this
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/api.cenvora.app/fullchain.pem:/etc/nginx/cert.pem:ro
      - /etc/letsencrypt/live/api.cenvora.app/privkey.pem:/etc/nginx/privkey.pem:ro
      - ./staticfiles:/app/static:ro
      - ./media:/app/media:ro
