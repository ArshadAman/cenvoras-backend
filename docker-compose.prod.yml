# Production override - docker-compose.yml will be merged with this
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    ports:
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/api.cenvora.app:/etc/letsencrypt/live/api.cenvora.app:ro
      - /etc/nginx/self-signed:/etc/nginx/self-signed:ro
      - ./staticfiles:/app/static:ro
      - ./media:/app/media:ro
