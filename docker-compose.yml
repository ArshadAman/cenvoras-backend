version: "3.9"

services:
  web:
    build: .
    command: uvicorn cenvoras.asgi:application --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:14
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/certs/fullchain.crt:/etc/nginx/cert.pem:ro
      - /etc/ssl/certs/privkey.pem:/etc/nginx/privkey.pem:ro
      - ./staticfiles:/app/static:ro
      - ./media:/app/media:ro
    depends_on:
      - web

volumes:
  pgdata: