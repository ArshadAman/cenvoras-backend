# ==========================================
# GLOBAL PERFORMANCE SETTINGS
# ==========================================
worker_processes auto;
worker_rlimit_nofile 200000;

events {
    use epoll;
    worker_connections 65535;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100000;
    types_hash_max_size 4096;
    server_tokens off;
    client_max_body_size 50M;  # Adjust for large file uploads

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ------------------------
    # LOGGING (lightweight)
    # ------------------------
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ------------------------
    # GZIP Compression
    # ------------------------
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # ------------------------
    # SSL Settings (secure + fast)
    # ------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:100m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_buffer_size 8k;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ------------------------
    # RATE LIMITING (DDoS protection)
    # ------------------------
    limit_req_zone $binary_remote_addr zone=api_rate:20m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:20m;

    # ==========================================
    # HTTP → HTTPS redirect
    # ==========================================
    server {
        listen 80;
        server_name devapi.cenvora.app api.cenvora.app;

        # Allow Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================
    # HTTPS Server (Main)
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name devapi.cenvora.app api.cenvora.app;

        ssl_certificate /etc/letsencrypt/live/cenvora.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cenvora.app/privkey.pem;

        # ------------------------
        # Security Headers
        # ------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ------------------------
        # Rate Limiting
        # ------------------------
        limit_req zone=api_rate burst=40 nodelay;
        limit_conn conn_limit 100;

        # ------------------------
        # Static Files
        # ------------------------
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ------------------------
        # Proxy to Django
        # ------------------------
        location / {
            proxy_pass http://web:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;

            # WebSocket Support (for async Django)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}